<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0E0E0E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Music</title>
  <link rel="stylesheet" href="css/styles.css?v=20260702d">
  <link rel="stylesheet" href="css/review.css?v=20260702d">
  <link rel="stylesheet" href="css/ripperv2.css?v=20260702d">
</head>
<body>
  <div id="app">
    <header id="app-header"></header>
    <main id="app-content"></main>

    <div id="mini-player" class="mini-player hidden">
      <div class="mini-progress"></div>
      <div class="mini-player-inner">
        <div class="mini-left">
          <div class="mini-art"></div>
          <div class="mini-info">
            <div class="mini-title"></div>
            <div class="mini-artist"></div>
          </div>
        </div>
        <div class="mini-center">
          <button class="mini-btn mini-prev-btn" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="mini-btn mini-play-btn" aria-label="Play">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/></svg>
          </button>
          <button class="mini-btn mini-next-btn" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
        </div>
        <div class="mini-right"></div>
      </div>
    </div>

  </div>

  <nav id="tab-bar" class="tab-bar" role="tablist">
    <button class="tab-item active" data-tab="home" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 21v-6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v6z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-item" data-tab="search" role="tab" aria-selected="false" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="tab-item" data-tab="favorites" role="tab" aria-selected="false" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Favorites</span>
    </button>
    <button class="tab-item" data-tab="finder" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.8 19.6 C 13.4 16.3 7.6 13.4 7.6 9 C 7.6 5.2 10.9 3.4 13.8 5.4 C 16.2 7 15.9 9.7 13.4 10.2 C 12 10.5 10.9 9.6 11.2 8.2"/></svg>
      <span>Ripper</span>
      <span class="tab-badge" style="display:none"></span>
    </button>
    <button class="tab-item" data-tab="library" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8.5a2 2 0 0 0-2-2h-7.4a2 2 0 0 1-1.5-.7l-1.2-1.4A2 2 0 0 0 8.4 3.7H4a2 2 0 0 0-2 2V18a2 2 0 0 0 2 2z"/></svg>
      <span>Library</span>
    </button>
    <button class="tab-item" data-tab="settings" id="tab-settings" role="tab" aria-selected="false" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09A1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <canvas id="color-sample-canvas" width="10" height="10" style="display:none"></canvas>

  <div id="now-playing" class="now-playing hidden">
    <div class="np-bg-glow" id="np-bg-glow"></div>
    <div class="np-desktop-layout">
      <div class="np-player-col">
        <div class="np-header">
          <button class="np-btn np-chevron-down" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="np-header-text"></div>
          <div class="np-header-right">
            <button class="np-btn np-more" aria-label="More">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </button>
          </div>
        </div>
        <div class="np-artwork">
          <div class="np-art-wrapper">
            <img id="np-art-bg" src="" alt="">
            <img id="np-art" src="" alt="">
          </div>
          <div class="np-float-tray">
            <div class="np-float-pill">
              <button id="np-like-btn" class="np-btn np-like-btn" aria-label="Like">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              <button id="np-share-btn" class="np-btn" aria-label="Share">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              </button>
              <button id="np-rip-btn" class="np-btn" aria-label="Rip More">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15-4-4 6.75-6.77a7.79 7.79 0 0 1 11 11L13 22l-4-4 6.39-6.36a3.14 3.14 0 0 0-4.44-4.43l-6.8 6.8Z"/></svg>
              </button>
              <button id="np-download-btn" class="np-btn" aria-label="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
            <div class="np-float-pill np-float-pill-queue">
              <button class="np-btn np-queue-btn" aria-label="Playlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
          </div>
          <div id="np-review-overlay" class="np-review-overlay">
            <div class="np-review-btn-row">
              <button class="np-review-quick-btn" onclick="ReviewUI.markOk(ReviewUI.currentTrackId)" title="No review needed">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </button>
              <button class="np-review-btn" onclick="ReviewUI.toggleDropdown()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:translate(-0.5px,-0.5px)"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </button>
              <button class="np-review-quick-btn np-review-delete-btn" onclick="ReviewUI.deleteTrack(ReviewUI.currentTrackId)" title="Delete file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="np-info">
          <div class="np-title-row">
            <div id="np-title" class="np-title"></div>
            <div id="np-artist" class="np-artist"></div>
          </div>
        </div>
        <div class="np-progress">
          <div class="np-waveform-container">
            <canvas id="np-waveform" class="np-waveform"></canvas>
          </div>
          <div class="np-time">
            <span id="np-time-current">0:00</span>
            <span id="np-time-total">0:00</span>
          </div>
        </div>
        <div class="np-controls">
          <button id="np-shuffle" class="np-btn np-ctrl" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button id="np-prev" class="np-btn np-ctrl" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button id="np-play" class="np-btn np-play-main" aria-label="Play">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/></svg>
          </button>
          <button id="np-next" class="np-btn np-ctrl" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
          <button id="np-repeat" class="np-btn np-ctrl" aria-label="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
        <div class="np-bottom">
          <div class="np-volume">
            <button class="np-btn" aria-label="Volume">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <div class="np-volume-bar" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
              <div class="np-volume-fill"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="queue-panel" class="queue-panel hidden">
        <div class="queue-header">
          <h2>Playlist</h2>
          <button class="queue-share-btn" aria-label="Share queue" title="Share queue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
          <button class="queue-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="queue-list" class="queue-list"></div>
        <div class="queue-volume">
          <button class="np-btn queue-volume-btn" aria-label="Volume">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <div class="queue-volume-bar">
            <div class="queue-volume-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="playlist-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Add to Playlist</h3>
      <button class="modal-option" id="create-playlist-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create New Playlist
      </button>
      <div id="playlist-modal-list" class="modal-list"></div>
    </div>
  </div>

  <div id="np-review-dropdown" class="np-review-dropdown">
    <div id="np-review-flags" class="np-review-flags"></div>
    <button class="review-menu-item" onclick="ReviewUI.rescrapMetadata(ReviewUI.currentTrackId)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      Rescrape Metadata
    </button>
    <button class="review-menu-item" onclick="ReviewUI.showEditMetaModal(ReviewUI.currentTrackId)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Metadata
    </button>
    <div class="review-menu-divider"></div>
    <button class="review-menu-item" onclick="ReviewUI.markOk(ReviewUI.currentTrackId)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Does Not Need Review
    </button>
    <button class="review-menu-item danger" onclick="ReviewUI.deleteTrack(ReviewUI.currentTrackId)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete File
    </button>
  </div>

  <div id="context-menu" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="context-menu-items" class="modal-list"></div>
    </div>
  </div>

  <div id="rescan-modal" class="modal-overlay hidden">
    <div class="modal-sheet modal-sheet-tall">
      <div class="modal-handle"></div>
      <h3 class="modal-title" id="rescan-modal-title">Metadata Matches</h3>
      <div class="rescan-search-row">
        <input type="search" enterkeyhint="search" class="search-input rescan-search-input" id="rescan-search-input" placeholder="Search artist - title...">
        <button class="rescan-search-btn" id="rescan-search-btn">Search</button>
      </div>
      <div id="rescan-modal-list" class="rescan-list"></div>
    </div>
  </div>

  <div id="edit-meta-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Edit Metadata</h3>
      <button class="edit-meta-delete-top" onclick="ReviewUI.deleteFromEditMeta()">Delete Track</button>
      <div class="edit-meta-cover">
        <img id="edit-meta-cover-preview" class="edit-meta-cover-img" alt="">
        <div class="edit-meta-cover-actions">
          <label class="edit-meta-cover-pick">
            <input type="file" id="edit-meta-cover-input" accept="image/*" hidden>
            <span>Upload Cover</span>
          </label>
          <button class="edit-meta-cover-clear" onclick="ReviewUI.clearCover()">Reset Cover</button>
          <span id="edit-meta-cover-hint" class="edit-meta-cover-hint"></span>
        </div>
      </div>
      <div class="edit-meta-fields">
        <div class="edit-meta-field">
          <label>Title</label>
          <input type="text" data-field="title" placeholder="Song title">
        </div>
        <div class="edit-meta-field">
          <label>Artist</label>
          <input type="text" data-field="artist" placeholder="Artist name">
        </div>
        <div class="edit-meta-field">
          <label>Album</label>
          <input type="text" data-field="album" placeholder="Album name">
        </div>
        <div class="edit-meta-field">
          <label>Album Artist</label>
          <input type="text" data-field="albumArtist" placeholder="Album artist">
        </div>
        <div class="edit-meta-field">
          <label>Track Number</label>
          <input type="number" data-field="trackNumber" placeholder="Track #" min="0">
        </div>
        <div class="edit-meta-field">
          <label>Year</label>
          <input type="number" data-field="year" placeholder="Year" min="0">
        </div>
        <div class="edit-meta-field">
          <label>Genre</label>
          <input type="text" data-field="genre" placeholder="Genre">
        </div>
      </div>
      <div class="edit-meta-actions">
        <button class="edit-meta-save" onclick="ReviewUI.saveEditMeta()">Save</button>
        <button class="edit-meta-cancel" onclick="ReviewUI.closeEditMetaModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="upload-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="upload-modal-header">
        <h3 class="modal-title" id="upload-modal-title" style="padding:0;flex:1">Upload Music</h3>
        <button class="upload-close-btn" id="upload-close-btn">&times;</button>
      </div>

      <div class="upload-modal-body">
        <div id="upload-step-select">
          <div class="upload-modal-tabs">
            <button class="upload-modal-tab active" data-utab="file">Files</button>
            <button class="upload-modal-tab" data-utab="folder">Folder</button>
          </div>
          <div class="upload-modal-panel" data-utab="file">
            <input type="file" id="upload-file-input" accept=".mp3,.flac,.m4a,.aac,.ogg,.wav,.opus,.wma,audio/*" multiple hidden>
            <button class="upload-pick-btn" id="upload-file-btn">
              <span class="upload-pick-btn-icon" id="upload-file-icon"></span>
              Choose Audio Files
            </button>
          </div>
          <div class="upload-modal-panel hidden" data-utab="folder">
            <input type="file" id="upload-folder-input" webkitdirectory directory multiple hidden>
            <button class="upload-pick-btn" id="upload-folder-btn">
              <span class="upload-pick-btn-icon" id="upload-folder-icon"></span>
              Choose Music Folder
            </button>
          </div>
          <div class="upload-file-list" id="upload-file-list"></div>
          <div id="upload-preview-area"></div>
          <input type="file" id="upload-cover-input" accept="image/*" hidden>
        </div>
