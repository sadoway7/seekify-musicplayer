<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveform Styles Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0E0E0E;
  color: #F0EFE9;
  min-height: 100vh;
  padding: 32px;
}
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
select {
  padding: 10px 14px;
  background: #1E1E1E;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: #F0EFE9;
  font-size: 14px;
  min-width: 280px;
}
select:focus { outline: none; border-color: #D4F040; }
.style-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  max-width: 800px;
}
.style-card {
  background: #1E1E1E;
  border-radius: 16px;
  padding: 20px;
}
.style-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.style-card p {
  font-size: 12px;
  color: #888;
  margin-bottom: 16px;
}
canvas {
  width: 100%;
  height: 80px;
  display: block;
  border-radius: 8px;
  cursor: pointer;
}
.loading {
  text-align: center;
  padding: 40px;
  color: #888;
}
.progress-slider {
  width: 100%;
  margin-top: 8px;
  accent-color: #D4F040;
}
</style>
</head>
<body>
<h1>Waveform Styles</h1>
<p class="subtitle">Pick a track and preview different waveform rendering styles</p>

<div class="controls">
  <select id="track-select">
    <option value="">Loading tracks...</option>
  </select>
  <input type="range" id="progress" class="progress-slider" min="0" max="100" value="35" style="max-width:200px">
  <span id="progress-label" style="font-size:13px;color:#888">35%</span>
</div>

<div id="loading" class="loading">Select a track to see waveform styles</div>
<div id="styles" class="style-grid" style="display:none"></div>

<script>
let peaks = null;

async function loadTracks() {
  const res = await fetch('/api/library');
  const data = await res.json();
  const sel = document.getElementById('track-select');
  sel.innerHTML = '<option value="">Choose a track...</option>';
  data.tracks.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.artist + ' — ' + t.title;
    sel.appendChild(opt);
  });
}

async function loadWaveform(trackId) {
  const loading = document.getElementById('loading');
  const styles = document.getElementById('styles');
  loading.style.display = 'block';
  loading.textContent = 'Generating waveform...';
  styles.style.display = 'none';

  const res = await fetch('/api/waveform/' + trackId);
  const data = await res.json();
  if (!data.peaks || data.peaks.length === 0) {
    loading.textContent = 'Could not generate waveform for this track';
    return;
  }
  peaks = data.peaks;
  loading.style.display = 'none';
  styles.style.display = 'grid';
  renderAll();
}

function getProgress() {
  return parseInt(document.getElementById('progress').value) / 100;
}

function renderAll() {
  if (!peaks) return;
  const grid = document.getElementById('styles');
  const frac = getProgress();

  const styles = [
    { name: 'Rounded Bars', desc: 'Current style — rounded rectangles with gap', render: renderRoundedBars },
    { name: 'Mirror Bars', desc: 'Bars mirrored top and bottom from center line', render: renderMirrorBars },
    { name: 'Thin Lines', desc: 'Thin vertical lines, no rounding, tighter spacing', render: renderThinLines },
    { name: 'Gradient Fill', desc: 'Smooth area fill with gradient opacity', render: renderGradientFill },
    { name: 'Dots / Circles', desc: 'Circle at each peak point, connected by thin line', render: renderDots },
    { name: 'Blocks / Pixel', desc: 'Square blocks with no gaps, retro pixel look', render: renderBlocks },
    { name: 'Smooth Curve', desc: 'Bezier curve through peak values, filled below', render: renderSmoothCurve },
    { name: 'EKG / Heartbeat', desc: 'Aggressive zigzag line with glow, like a heartbeat monitor', render: renderEKG },
  ];

  grid.innerHTML = '';
  styles.forEach(s => {
    const card = document.createElement('div');
    card.className = 'style-card';
    const h = document.createElement('h3');
    h.textContent = s.name;
    const p = document.createElement('p');
    p.textContent = s.desc;
    const canvas = document.createElement('canvas');
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      document.getElementById('progress').value = Math.round(x * 100);
      document.getElementById('progress-label').textContent = Math.round(x * 100) + '%';
      renderAll();
    });
    card.appendChild(h);
    card.appendChild(p);
    card.appendChild(canvas);
    grid.appendChild(card);

    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    s.render(canvas, frac);
  });
}

const playedColor = '#D4F040';
const unplayedColor = 'rgba(255,255,255,0.18)';
const hoverColor = 'rgba(212,240,64,0.8)';

function renderRoundedBars(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const pw = 3 * dpr, pg = 2 * dpr;
  const numBars = Math.min(peaks.length, Math.floor(w / (pw + pg)));
  const step = peaks.length / numBars;
  const totalW = numBars * (pw + pg);
  const offsetX = (w - totalW) / 2;
  const playX = frac * numBars;

  for (let i = 0; i < numBars; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const barH = Math.max(4, val * h * 0.85);
    const x = offsetX + i * (pw + pg);
    const y = (h - barH) / 2;
    ctx.fillStyle = i < playX ? playedColor : unplayedColor;
    const r = Math.min(pw / 2, barH / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + pw - r, y);
    ctx.arcTo(x + pw, y, x + pw, y + r, r);
    ctx.lineTo(x + pw, y + barH - r);
    ctx.arcTo(x + pw, y + barH, x + pw - r, y + barH, r);
    ctx.lineTo(x + r, y + barH);
    ctx.arcTo(x, y + barH, x, y + barH - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    ctx.fill();
  }
}

function renderMirrorBars(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const pw = 3 * dpr, pg = 2 * dpr;
  const numBars = Math.min(peaks.length, Math.floor(w / (pw + pg)));
  const step = peaks.length / numBars;
  const totalW = numBars * (pw + pg);
  const offsetX = (w - totalW) / 2;
  const playX = frac * numBars;
  const mid = h / 2;

  for (let i = 0; i < numBars; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const barH = Math.max(2, val * mid * 0.8);
    const x = offsetX + i * (pw + pg);
    ctx.fillStyle = i < playX ? playedColor : unplayedColor;
    const r = Math.min(pw / 2, barH / 2);
    ctx.beginPath();
    ctx.roundRect(x, mid - barH, pw, barH, [r, r, 0, 0]);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(x, mid, pw, barH, [0, 0, r, r]);
    ctx.fill();
  }
}

function renderThinLines(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const pw = 1.5 * dpr, pg = 1.5 * dpr;
  const numBars = Math.min(peaks.length, Math.floor(w / (pw + pg)));
  const step = peaks.length / numBars;
  const totalW = numBars * (pw + pg);
  const offsetX = (w - totalW) / 2;
  const playX = frac * numBars;

  for (let i = 0; i < numBars; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const barH = Math.max(2, val * h * 0.9);
    const x = offsetX + i * (pw + pg);
    const y = (h - barH) / 2;
    ctx.fillStyle = i < playX ? playedColor : unplayedColor;
    ctx.fillRect(x, y, pw, barH);
  }
}

function renderGradientFill(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const numPts = Math.min(peaks.length, 300);
  const step = peaks.length / numPts;
  const barW = w / numPts;
  const playX = frac * w;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let i = 0; i < numPts; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const x = i * barW;
    const y = h - val * h * 0.85 - h * 0.05;
    if (i === 0) ctx.lineTo(x, y);
    else {
      const px = (i - 1) * barW;
      const py = h - (peaks[Math.floor((i - 1) * step)] || 0) * h * 0.85 - h * 0.05;
      const cpx = (px + x) / 2;
      ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
    }
  }
  ctx.lineTo(w, h);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, playX, 0);
  grad.addColorStop(0, playedColor);
  grad.addColorStop(1, playedColor);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.5;
  ctx.fill();

  const grad2 = ctx.createLinearGradient(playX, 0, w, 0);
  grad2.addColorStop(0, unplayedColor);
  grad2.addColorStop(1, unplayedColor);
  ctx.fillStyle = grad2;
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.strokeStyle = playedColor;
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath();
  for (let i = 0; i < numPts; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const x = i * barW;
    const y = h - val * h * 0.85 - h * 0.05;
    if (i === 0) ctx.moveTo(x, y);
    else {
      const px = (i - 1) * barW;
      const py = h - (peaks[Math.floor((i - 1) * step)] || 0) * h * 0.85 - h * 0.05;
      const cpx = (px + x) / 2;
      ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function renderDots(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const numPts = Math.min(peaks.length, 120);
  const step = peaks.length / numPts;
  const gap = w / numPts;
  const playX = frac * numPts;

  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1 * dpr;
  ctx.beginPath();
  for (let i = 0; i < numPts; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const x = i * gap + gap / 2;
    const y = h / 2 - (val - 0.5) * h * 0.7;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  for (let i = 0; i < numPts; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const x = i * gap + gap / 2;
    const y = h / 2 - (val - 0.5) * h * 0.7;
    const r = Math.max(2, val * 5) * dpr;
    ctx.fillStyle = i < playX ? playedColor : unplayedColor;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderBlocks(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const blockSize = 4 * dpr;
  const numCols = Math.floor(w / blockSize);
  const numRows = Math.floor(h / blockSize);
  const step = peaks.length / numCols;
  const playCol = frac * numCols;

  for (let col = 0; col < numCols; col++) {
    const val = peaks[Math.floor(col * step)] || 0;
    const filledRows = Math.max(1, Math.round(val * numRows));
    const startRow = Math.floor((numRows - filledRows) / 2);
    for (let row = startRow; row < startRow + filledRows && row < numRows; row++) {
      ctx.fillStyle = col < playCol ? playedColor : unplayedColor;
      ctx.fillRect(col * blockSize + 0.5, row * blockSize + 0.5, blockSize - 1, blockSize - 1);
    }
  }
}

function renderSmoothCurve(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const numPts = Math.min(peaks.length, 200);
  const step = peaks.length / numPts;
  const barW = w / numPts;

  const getPoints = () => {
    const pts = [];
    for (let i = 0; i < numPts; i++) {
      const val = peaks[Math.floor(i * step)] || 0;
      pts.push({ x: i * barW, y: h / 2 - (val - 0.5) * h * 0.8 });
    }
    return pts;
  };

  const drawCurve = (pts) => {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const cpx = (pts[i - 1].x + pts[i].x) / 2;
      ctx.quadraticCurveTo(pts[i - 1].x + (pts[i].x - pts[i - 1].x) * 0.5, pts[i - 1].y, cpx, (pts[i - 1].y + pts[i].y) / 2);
    }
    const last = pts[pts.length - 1];
    ctx.lineTo(last.x, last.y);
  };

  const pts = getPoints();
  const playIdx = Math.floor(frac * numPts);

  if (playIdx > 0) {
    const playedPts = pts.slice(0, playIdx + 1);
    ctx.save();
    drawCurve(playedPts);
    ctx.lineTo(pts[playIdx].x, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = 'rgba(212,240,64,0.25)';
    ctx.fill();
    drawCurve(playedPts);
    ctx.strokeStyle = playedColor;
    ctx.lineWidth = 2 * dpr;
    ctx.stroke();
    ctx.restore();
  }

  if (playIdx < numPts - 1) {
    const unplayedPts = pts.slice(playIdx);
    ctx.save();
    drawCurve(unplayedPts);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5 * dpr;
    ctx.stroke();
    ctx.restore();
  }
}

function renderEKG(canvas, frac) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const mid = h / 2;
  const playX = frac * w;

  ctx.strokeStyle = playedColor;
  ctx.lineWidth = 2 * dpr;
  ctx.shadowColor = playedColor;
  ctx.shadowBlur = 6 * dpr;
  ctx.beginPath();

  const numPts = Math.min(peaks.length, 300);
  const step = peaks.length / numPts;
  const barW = w / numPts;

  for (let i = 0; i < numPts; i++) {
    const val = peaks[Math.floor(i * step)] || 0;
    const x = i * barW;
    const y = mid - (val - 0.5) * h * 0.85;
    if (i === 0) ctx.moveTo(x, y);
    else {
      const prevVal = peaks[Math.floor((i - 1) * step)] || 0;
      const prevX = (i - 1) * barW;
      const prevY = mid - (prevVal - 0.5) * h * 0.85;
      ctx.lineTo(x, prevY);
      ctx.lineTo(x, y);
    }
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

document.getElementById('track-select').addEventListener('change', (e) => {
  if (e.target.value) loadWaveform(e.target.value);
});
document.getElementById('progress').addEventListener('input', (e) => {
  document.getElementById('progress-label').textContent = e.target.value + '%';
  renderAll();
});

loadTracks();
</script>
</body>
</html>
